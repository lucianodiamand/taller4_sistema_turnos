<div class="modulo">
  <h1>Disponibilidades</h1>

  <table mat-table [dataSource]="items()" class="tabla">
    <ng-container matColumnDef="profesional">
      <th mat-header-cell *matHeaderCellDef>Profesional</th>
      <td mat-cell *matCellDef="let d">{{ d.profesional?.usuario?.nombre }}</td>
    </ng-container>
    <ng-container matColumnDef="diaSemana">
      <th mat-header-cell *matHeaderCellDef>Día</th>
      <td mat-cell *matCellDef="let d">{{ dia(d.diaSemana) }}</td>
    </ng-container>
    <ng-container matColumnDef="horario">
      <th mat-header-cell *matHeaderCellDef>Horario</th>
      <td mat-cell *matCellDef="let d">{{ hora(d.horaInicio) }}–{{ hora(d.horaFin) }}</td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="acciones-col">Acciones</th>
      <td mat-cell *matCellDef="let d" class="acciones-col">
        <button mat-flat-button color="primary" (click)="reservar(d)">Reservar</button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas"></tr>
  </table>

  @if (!items().length) {
    <p class="vacio">No hay disponibilidades cargadas por ahora.</p>
  }
</div>
