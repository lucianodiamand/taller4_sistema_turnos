<section class="admin-module">
  <div class="module-header">
    <div>
      <h2>Profesionales</h2>
      <p>Alta, edición y eliminación de profesionales con usuario asociado.</p>
    </div>
    <button type="button" class="primary" (click)="openCreate()">Nuevo profesional</button>
  </div>

  <app-admin-entity-form
    *ngIf="showForm"
    title="{{ editingId ? 'Editar profesional' : 'Crear profesional' }}"
    submitLabel="Guardar"
    [model]="formModel"
    [fields]="fields"
    (submitForm)="onSubmit($event)"
    (cancelForm)="showForm = false"
  ></app-admin-entity-form>

  <div class="table-wrapper">
    <p *ngIf="isLoading">Cargando...</p>
    <app-admin-data-table
      [items]="items"
      [columns]="columns"
      emptyMessage="No hay profesionales cargados."
      (edit)="openEdit($event)"
      (remove)="onRemove($event)"
    ></app-admin-data-table>
  </div>
</section>
