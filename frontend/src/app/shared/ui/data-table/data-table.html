@if (data().length) {
  <table mat-table [dataSource]="data()" class="data-table">
    @for (col of columns(); track col.key) {
      <ng-container [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef>{{ col.label }}</th>
        <td mat-cell *matCellDef="let item">{{ celda(item, col) }}</td>
      </ng-container>
    }

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="acciones-col">Acciones</th>
      <td mat-cell *matCellDef="let item" class="acciones-col">
        <button mat-icon-button color="primary" aria-label="Editar" (click)="editar.emit(item)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" aria-label="Eliminar" (click)="eliminar.emit(item)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnasMostradas()"></tr>
    <tr mat-row *matRowDef="let row; columns: columnasMostradas()"></tr>
  </table>
} @else {
  <p class="empty">{{ emptyMessage() }}</p>
}
