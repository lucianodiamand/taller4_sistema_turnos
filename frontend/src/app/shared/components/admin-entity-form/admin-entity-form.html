<form class="entity-form" (ngSubmit)="onSubmit()">
  <div class="form-header">
    <h3>{{ title }}</h3>
  </div>

  <div class="field-grid">
    <div class="field" *ngFor="let field of fields" [class.full-width]="field.type === 'textarea'">
      
      <label *ngIf="field.type !== 'checkbox'" [for]="field.key">{{ field.label }}</label>

      <input
        *ngIf="field.type !== 'textarea' && field.type !== 'select' && field.type !== 'checkbox'"
        [id]="field.key"
        [type]="field.type || 'text'"
        [name]="field.key"
        [(ngModel)]="model[field.key]"
        [required]="field.required || false"
        [placeholder]="field.placeholder || ''"
      />

      <textarea
        *ngIf="field.type === 'textarea'"
        [id]="field.key"
        [name]="field.key"
        [(ngModel)]="model[field.key]"
        [required]="field.required || false"
        [placeholder]="field.placeholder || ''"
      ></textarea>

      <select
        *ngIf="field.type === 'select'"
        [id]="field.key"
        [name]="field.key"
        [(ngModel)]="model[field.key]"
        [required]="field.required || false"
      >
        <option *ngFor="let option of field.options" [value]="option.value">{{ option.label }}</option>
      </select>

      <label *ngIf="field.type === 'checkbox'" class="checkbox">
        <input type="checkbox" [name]="field.key" [(ngModel)]="model[field.key]" />
        {{ field.label }}
      </label>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="secondary" (click)="onCancel()">{{ cancelLabel }}</button>
    <button type="submit" class="primary">{{ submitLabel }}</button>
  </div>
</form>
