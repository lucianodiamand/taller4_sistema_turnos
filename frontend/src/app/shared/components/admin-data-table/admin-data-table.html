<div class="table-card">
  <table>
    <thead>
      <tr>
        <th *ngFor="let column of columns">{{ column.label }}</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items">
        <td *ngFor="let column of columns">{{ getCellValue(item, column) }}</td>
        <td>
          <button type="button" class="action-btn action-btn--edit" (click)="edit.emit(item)">Editar</button>
          <button type="button" class="action-btn action-btn--danger" (click)="remove.emit(item)">Baja</button>
        </td>
      </tr>
      <tr *ngIf="!items.length">
        <td [attr.colspan]="columns.length + 1">{{ emptyMessage }}</td>
      </tr>
    </tbody>
  </table>
</div>
